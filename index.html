<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Boodschappen Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f2f2f2;
}

#reader{
    width:300px;
    margin:auto;
}

button{
    padding:10px;
    margin:10px;
    font-size:16px;
}

#resultaat{
    margin-top:20px;
}
</style>

</head>

<body>

<h1>Boodschappen Scanner</h1>

<div id="reader"></div>

<button onclick="haalBarcodes()">Laat gescande barcodes zien</button>

<div id="resultaat"></div>

<script>

function onScanSuccess(decodedText) {

    console.log("Barcode:", decodedText);

    fetch("http://192.168.2.38:3000/barcode", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            barcode: decodedText
        })
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("resultaat").innerHTML =
            "<p>Barcode opgeslagen: " + decodedText + "</p>";
    })
    .catch(err => {
        console.error(err);
        alert("Kan niet verbinden met de server");
    });

}

let scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);

function haalBarcodes(){

fetch("http://192.168.2.38:3000/barcodes")
.then(res => res.json())
.then(data => {

let html = "<h3>Gescande barcodes</h3>";

data.forEach(code => {
html += "<p>"+code+"</p>";
});

document.getElementById("resultaat").innerHTML = html;

});

}

</script>

</body>
</html>
