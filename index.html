<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boodschappen Scanner</title>

<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f2f7;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

.item {
    padding: 12px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: 0.3s;
}

.item:last-child {
    border-bottom: none;
}

.item.gekocht {
    text-decoration: line-through;
    color: gray;
    opacity: 0.6;
    transform: scale(0.97);
}

input, button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

button {
    background: #007aff;
    color: white;
    font-weight: bold;
}

#scanner {
    width: 100%;
}
</style>
</head>

<body>

<h1>Boodschappen Scanner</h1>

<div class="container">

<div class="card">
    <div id="lijst"></div>
</div>

<div class="card">
    <input type="text" id="nieuwItem" placeholder="Bijv. Cola">
    <button onclick="addItem()">Toevoegen</button>
</div>

<div class="card">
    <button onclick="startScanner()">Start Scanner</button>
    <div id="scanner"></div>
</div>

</div>

<script>
let lijst = JSON.parse(localStorage.getItem("lijst")) || [];

function save() {
    localStorage.setItem("lijst", JSON.stringify(lijst));
}

function render() {
    const lijstDiv = document.getElementById("lijst");
    lijstDiv.innerHTML = "";

    lijst.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item" + (item.gekocht ? " gekocht" : "");
        div.innerText = item.naam;
        div.onclick = () => toggle(index);
        lijstDiv.appendChild(div);
    });
}

function addItem() {
    const input = document.getElementById("nieuwItem");
    if (!input.value) return;

    lijst.push({ naam: input.value.toLowerCase(), gekocht: false });
    input.value = "";
    save();
    render();
}

function toggle(index) {
    lijst[index].gekocht = !lijst[index].gekocht;
    save();
    render();
}

function startScanner() {
    Quagga.init({
        inputStream: {
            type: "LiveStream",
            target: document.querySelector('#scanner'),
            constraints: {
                facingMode: "environment"
            }
        },
        decoder: {
            readers: ["ean_reader"]
        }
    }, function(err) {
        if (err) {
            console.log(err);
            alert("Camera fout");
            return;
        }
        Quagga.start();
    });

    Quagga.onDetected(function(data) {
        let barcode = data.codeResult.code;
        checkProduct(barcode);
    });
}

async function checkProduct(barcode) async function checkProduct(barcode) {
    Quagga.stop();

    try {
        let response = await fetch("https://world.openfoodfacts.org/api/v0/product/" + barcode + ".json");
        let data = await response.json();

        let matched = false;

        if (data.status === 1) {
            let productName = (data.product.product_name || "").toLowerCase();

            lijst.forEach(item => {
                if (productName.includes(item.naam)) {
                    item.gekocht = true;
                    matched = true;
                }
            });
        }

        // ALS API product niet kent of geen match
        if (!matched) {
            // Fallback: vraag gebruiker
            let handmatig = prompt("Product niet automatisch herkend. Onder welke categorie valt dit? (bijv. cola, melk)");
            
            if (handmatig) {
                lijst.forEach(item => {
                    if (item.naam === handmatig.toLowerCase()) {
                        item.gekocht = true;
                    }
                });
            }
        }

        save();
        render();

    } catch (e) {
        alert("Internet probleem");
    }
}

render();
</script>

</body>
</html>
