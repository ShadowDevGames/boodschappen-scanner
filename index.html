<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boodschappen Scanner</title>

<!-- QuaggaJS voor barcode scanning -->
<script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f2f7;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.container {
    max-width: 480px;
    margin: auto;
}

.card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    padding: 15px;
    margin-bottom: 20px;
}

#lijst .item {
    padding: 12px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 10px;
    margin-bottom: 6px;
    background: #f9f9f9;
}

#lijst .item:last-child {
    margin-bottom: 0;
    border-bottom: none;
}

.item.gekocht {
    text-decoration: line-through;
    color: gray;
    opacity: 0.6;
    transform: scale(0.97);
}

input, button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-top: 10px;
}

button {
    background-color: #007aff;
    color: white;
    font-weight: bold;
}

#scanner {
    width: 100%;
    height: 250px;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}
</style>
</head>
<body>
<h1>Boodschappen Scanner</h1>

<div class="container">
    <div class="card">
        <div id="lijst"></div>
    </div>

    <div class="card">
        <input type="text" id="nieuwItem" placeholder="Bijv. Cola">
        <button id="nieuwItemBtn">Toevoegen</button>
    </div>

    <div class="card">
        <button id="startScannerBtn">Start Scanner</button>
        <div id="scanner"></div>
    </div>
</div>

<script type="module">
// --- DATA ---
let lijst = []; // start leeg bij refresh
let barcodeMap = JSON.parse(localStorage.getItem("barcodeMap")) || {};

// --- HELPERS ---
function save() {
    localStorage.setItem("barcodeMap", JSON.stringify(barcodeMap));
}

function render() {
    const lijstDiv = document.getElementById("lijst");
    lijstDiv.innerHTML = "";
    lijst.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item" + (item.gekocht ? " gekocht" : "");
        div.innerText = item.naam;
        div.onclick = () => toggle(index);
        lijstDiv.appendChild(div);
    });
}

function addItem() {
    const input = document.getElementById("nieuwItem");
    if (!input.value) return;
    lijst.push({ naam: input.value.toLowerCase(), gekocht: false });
    input.value = "";
    render();
}

function toggle(index) {
    lijst[index].gekocht = !lijst[index].gekocht;
    render();
}

// --- SCANNER ---
function startScanner() {
    Quagga.init({
        inputStream: {
            type: "LiveStream",
            target: document.querySelector('#scanner'),
            constraints: { facingMode: "environment" }
        },
        decoder: { readers: ["ean_reader"] }
    }, function(err) {
        if (err) {
            console.log(err);
            alert("Camera fout: " + err);
            return;
        }
        Quagga.start();
    });

    Quagga.onDetected(async function(data) {
        let barcode = data.codeResult.code;
        await checkProduct(barcode);
    });
}

// --- CHECK PRODUCT ---
async function checkProduct(barcode) {
    Quagga.stop();

    // 1. Eerst check eigen barcodeMap
    if (barcodeMap[barcode]) {
        lijst.forEach(item => {
            if (item.naam === barcodeMap[barcode]) {
                item.gekocht = true;
            }
        });
        render();
        return;
    }

    // 2. Check Open Food Facts
    try {
        let response = await fetch("https://world.openfoodfacts.org/api/v0/product/" + barcode + ".json");
        let data = await response.json();

        let matched = false;

        if (data.status === 1) {
            let productName = (data.product.product_name || "").toLowerCase();
            lijst.forEach(item => {
                if (productName.includes(item.naam)) {
                    item.gekocht = true;
                    matched = true;
                    barcodeMap[barcode] = item.naam;
                }
            });
        }

        // 3. Fallback prompt
        if (!matched) {
            let handmatig = prompt("Product niet automatisch herkend. Welke categorie is dit? (bijv. cola, melk)");
            if (handmatig) {
                lijst.forEach(item => {
                    if (item.naam === handmatig.toLowerCase()) {
                        item.gekocht = true;
                        barcodeMap[barcode] = item.naam;
                    }
                });
            }
        }

        save();
        render();

    } catch (e) {
        alert("Internet probleem: " + e);
    }
}

// --- INIT ---
render();
window.addItem = addItem;
window.startScanner = startScanner;

// Event listeners
document.getElementById("nieuwItemBtn").addEventListener("click", addItem);
document.getElementById("startScannerBtn").addEventListener("click", startScanner);
</script>
</body>
</html>
